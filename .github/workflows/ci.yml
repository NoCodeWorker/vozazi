name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vozazi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python dependencies
        working-directory: ./apps/audio-engine
        run: pip install -r requirements.txt

      - name: Run linters
        run: npm run lint
        continue-on-error: true

      - name: Build packages
        run: npm run build

      - name: Run frontend tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vozazi_test
          CLERK_SECRET_KEY: test_key
          STRIPE_SECRET_KEY: sk_test_key

      - name: Run audio engine tests
        working-directory: ./apps/audio-engine
        run: pytest
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vozazi_test
          REDIS_URL: redis://localhost:6379

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: false
          tags: vozazi/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build audio-engine Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/audio-engine/Dockerfile
          push: false
          tags: vozazi/audio-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
